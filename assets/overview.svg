<svg width="390" height="170" viewBox="0 0 390 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Overview</title>
  <desc id="desc">Overview of public GitHub activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="390" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4fbf7"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="389" height="169" rx="10" fill="url(#bg)" stroke="#d0d7de"/>
  <text x="24" y="34" fill="#0969da" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GitHub Overview</text>
  <text x="24" y="57" fill="#57606a" font-family="Segoe UI, Arial, sans-serif" font-size="12">Last 12 months</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="24" y="102" fill="#24292f" font-size="34" font-weight="700">142</text>
    <text x="24" y="124" fill="#57606a" font-size="13">contributions</text>
    <text x="170" y="92" fill="#57606a" font-size="13">Public repos</text>
    <text x="346" y="92" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">10</text>
    <line x1="170" y1="105" x2="346" y2="105" stroke="#d8dee4"/>
    <text x="170" y="128" fill="#57606a" font-size="13">Stars / Forks</text>
    <text x="346" y="128" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">3 / 0</text>
    <line x1="170" y1="141" x2="346" y2="141" stroke="#d8dee4"/>
    <text x="170" y="160" fill="#57606a" font-size="13">Followers</text>
    <text x="346" y="160" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">2</text>
  </g>
</svg>
