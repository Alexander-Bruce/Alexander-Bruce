<svg width="390" height="170" viewBox="0 0 390 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Stats</title>
  <desc id="desc">Public repositories 10, stars 3, forks 0, followers 2.</desc>
  <rect x="0.5" y="0.5" width="389" height="169" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="24" y="35" fill="#0969da" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GitHub Stats</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="24" y="75" fill="#57606a" font-size="14">Public repositories</text>
    <text x="340" y="75" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">10</text>
    <line x1="24" y1="91" x2="366" y2="91" stroke="#d8dee4"/>
    <text x="24" y="116" fill="#57606a" font-size="14">Total stars</text>
    <text x="340" y="116" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">3</text>
    <line x1="24" y1="132" x2="366" y2="132" stroke="#d8dee4"/>
    <text x="24" y="157" fill="#57606a" font-size="14">Forks / Followers</text>
    <text x="340" y="157" text-anchor="end" fill="#24292f" font-size="16" font-weight="700">0 / 2</text>
  </g>
</svg>
